<!DOCTYPE html>
<html>
<head>
    <style>
        @page { size: A4; margin: 0; }
        body { 
            font-family: "Times New Roman", serif; 
            width: 210mm; height: 297mm; margin: 0; padding: 0;
            position: relative;
        }
        .container { padding: 20mm 15mm 20mm 30mm; height: 257mm; position: relative; }
        
        .header { text-align: center; font-weight: bold; font-size: 14pt; }
        .department { text-align: center; font-size: 14pt; margin-top: 5mm; }
        
        .title-block {
            position: absolute; top: 120mm; left: 30mm; right: 15mm;
            text-align: center;
        }
        .subject { font-size: 14pt; margin-bottom: 5mm; }
        .work-title { font-size: 16pt; font-weight: bold; text-transform: uppercase; }
        
        .info-block {
            position: absolute; top: 190mm; right: 15mm;
            text-align: left; width: 80mm; font-size: 12pt;
        }
        
        .footer {
            position: absolute; bottom: 20mm; left: 30mm; right: 15mm;
            text-align: center; font-size: 12pt;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">{{ university | upper }}</div>
        <div class="department">{{ department }}</div>
        
        <div class="title-block">
            <div class="subject">{{ subject }}</div>
            <div class="work-title">{{ title }}</div>
        </div>
        
        <div class="info-block">
            <b>Выполнил студент:</b><br>{{ student }}<br>
            Группа: {{ group }}<br><br>
            <b>Проверил:</b><br>{{ teacher }}
        </div>
        
        <div class="footer">
            {{ city }} {{ year }}
        </div>
    </div>
</body>
</html>
